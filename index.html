<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OASIS 매거진 | Autohands R&D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /*깔끔하고 트렌디한 폰트 (Pretendard) */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f4f6f8; 
            color: #1a1b1e;
            word-break: keep-all;
        }

        /* 카드 호버(마우스 올렸을 때) 이펙트 */
        .article-card { transition: all 0.2s ease-in-out; border: 1px solid #e9ecef; }
        .article-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); border-color: #cbd5e1; }
        
        /* 텍스트 줄임표 처리 */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* 포인트 컬러 (오토핸즈 블루 + 뉴닉 엑센트) */
        .text-brand { color: #2563eb; }
        .bg-brand { background-color: #2563eb; }
        .accent-tag { background: #ff6b6b; color: white; }

        /* 모달 (기사 원문 뷰어) */
        #article-modal { display: none; }
        #article-modal.active { display: flex; }
    </style>
</head>
<body class="antialiased selection:bg-blue-200">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="bg-brand text-white font-black text-xl w-10 h-10 flex items-center justify-center rounded-lg shadow-md">O</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-gray-900 leading-none">OASIS <span class="text-brand">R&D</span></h1>
                    <p class="text-[11px] font-bold text-gray-400 mt-1 uppercase tracking-widest">Autohands Mobility Insight</p>
                </div>
            </div>
            <div class="flex items-center gap-4 bg-gray-100 p-1.5 rounded-xl border border-gray-200">
                <input type="date" id="date-picker" class="bg-transparent border-none text-sm font-bold text-gray-700 cursor-pointer outline-none px-2" onchange="loadReport(this.value)">
                <span id="display-issue" class="bg-white text-brand px-3 py-1 rounded-lg text-sm font-black shadow-sm">NO. --</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12" id="magazine-content">
        <div class="flex flex-col items-center justify-center py-32">
            <i class="fas fa-circle-notch fa-spin text-5xl text-brand mb-4"></i>
            <p class="text-gray-500 font-bold text-lg">최신 인사이트 리포트를 구성하고 있습니다...</p>
        </div>
    </main>

    <div id="article-modal" class="fixed inset-0 bg-gray-900/90 z-[100] items-center justify-center p-4 backdrop-blur-sm" onclick="clickOutsideModal(event)">
        <div class="bg-white w-full max-w-6xl h-[90vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl relative transition-all" onclick="event.stopPropagation()">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <div class="flex items-center gap-2 text-gray-600 font-bold text-sm">
                    <i class="fas fa-newspaper"></i> 원문 브라우저
                </div>
                <button type="button" onclick="closeArticle()" class="w-8 h-8 flex items-center justify-center bg-gray-200 text-gray-600 rounded-full hover:bg-gray-800 hover:text-white transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <iframe id="article-frame" src="" class="w-full h-full border-none bg-white"></iframe>
            <div id="fallback-ui" class="w-full h-full flex flex-col items-center justify-center bg-gray-50 hidden">
                <div class="bg-white p-10 rounded-3xl shadow-sm text-center border border-gray-100 max-w-lg">
                    <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl text-gray-400"><i class="fas fa-lock"></i></div>
                    <h3 class="text-xl font-black text-gray-800 mb-3">해당 언론사는 외부 뷰어를 차단합니다</h3>
                    <p class="text-gray-500 text-sm mb-8 line-relaxed">보안 정책(X-Frame-Options)으로 인해 새 창에서만 읽을 수 있습니다.</p>
                    <button id="fallback-btn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold hover:bg-brand transition shadow-lg">
                        새 창에서 안전하게 읽기 <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 파이어베이스 설정 유지
        const firebaseConfig = {
          apiKey: "AIzaSyBjx92fZFNCi8c9nSgG6nU_eJfwq3356Uk",
          authDomain: "magazine-13f81.firebaseapp.com",
          projectId: "magazine-13f81",
          storageBucket: "magazine-13f81.firebasestorage.app",
          messagingSenderId: "897855603773",
          appId: "1:897855603773:web:82e68dd3075df768e95654",
          measurementId: "G-9629TR6YGD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 아이프레임 차단되는 언론사 목록
        const blockedSites = ['naver.com','daum.net','chosun.com','joongang.co.kr','donga.com','mk.co.kr','hankyung.com','etnews.com','yna.co.kr','autotribune.co.kr'];

        window.smartOpen = function(url) {
            if(!url) return;
            const isBlocked = blockedSites.some(site => url.includes(site));
            document.getElementById('article-modal').classList.add('active');
            document.body.style.overflow = 'hidden';

            if (isBlocked) {
                document.getElementById('article-frame').style.display = 'none';
                document.getElementById('fallback-ui').style.display = 'flex';
                document.getElementById('fallback-btn').onclick = () => { window.open(url, '_blank'); closeArticle(); };
            } else {
                document.getElementById('article-frame').style.display = 'block';
                document.getElementById('fallback-ui').style.display = 'none';
                document.getElementById('article-frame').src = url;
            }
        }
        
        window.closeArticle = function() { 
            document.getElementById('article-modal').classList.remove('active'); 
            document.getElementById('article-frame').src = "about:blank"; 
            document.body.style.overflow = 'auto'; 
        }
        
        window.clickOutsideModal = function(e) { 
            if(e.target.id === 'article-modal') closeArticle(); 
        }

        // 🔥 무적의 유튜브 URL 변환기
        window.getYoutubeEmbed = function(url) {
            if(!url) return '';
            let id = '';
            
            if (url.includes('youtu.be/')) {
                id = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('v=')) {
                id = url.split('v=')[1].split('&')[0];
            } else if (url.includes('embed/')) {
                id = url.split('embed/')[1].split('?')[0];
            }
            
            if (!id) return '';
            return `https://www.youtube.com/embed/${id}?autoplay=0&rel=0`;
        }

        window.loadReport = async function(date) {
            const content = document.getElementById('magazine-content');
            
            try {
                const q = query(collection(db, "magazines"));
                const querySnapshot = await getDocs(q);
                let targetData = null;
                querySnapshot.forEach((doc) => { if (doc.id.startsWith(date)) targetData = doc.data(); });

                if (!targetData) {
                    content.innerHTML = `<div class="flex flex-col items-center justify-center py-32 text-center"><div class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center text-4xl mb-6">🏜️</div><h2 class="text-2xl font-black text-gray-800 mb-2">${date}</h2><p class="text-gray-500 font-medium">아직 발행된 오아시스 리포트가 없습니다.</p></div>`;
                    document.getElementById('display-issue').textContent = "NO DATA";
                    return;
                }

                document.getElementById('display-issue').textContent = targetData.issueName || 'NEW';

                const allArticles = targetData.articles || [];
                const mainData = allArticles.find(a => a.category === 'main');
                const aiData = allArticles.filter(a => a.category === 'ai');
                const autoData = allArticles.filter(a => a.category === 'auto');

                // 1. 영상 섹션 (🔥 KBS 차단 우회 referrerpolicy 적용 완료)
                const embedUrl = targetData.video ? window.getYoutubeEmbed(targetData.video.url) : '';
                const videoHtml = embedUrl ? `
                    <section class="mb-16">
                        <div class="bg-gray-900 rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
                            <div class="w-full md:w-2/3 aspect-video bg-black relative">
                                <iframe class="absolute top-0 left-0 w-full h-full" src="${embedUrl}" frameborder="0" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
                            </div>
                            <div class="w-full md:w-1/3 p-8 flex flex-col justify-center">
                                <span class="text-red-500 font-black text-xs uppercase tracking-widest mb-3 flex items-center gap-2"><i class="fab fa-youtube text-lg"></i> ${targetData.video.source || 'YouTube'}</span>
                                <h2 class="text-2xl font-bold text-white leading-snug mb-4">${targetData.video.title}</h2>
                                <p class="text-gray-400 text-sm line-clamp-3 leading-relaxed">${targetData.video.desc}</p>
                            </div>
                        </div>
                    </section>
                ` : '';

                // 2. 메인 기사 섹션
                const mainHtml = mainData ? `
                    <section class="mb-16 cursor-pointer group" onclick="smartOpen('${mainData.link}')">
                        <div class="flex items-center gap-2 mb-6">
                            <span class="w-2 h-8 bg-brand rounded-full"></span>
                            <h2 class="text-2xl font-black tracking-tight text-gray-900">오늘의 딥다이브</h2>
                        </div>
                        <div class="bg-white rounded-3xl overflow-hidden article-card flex flex-col lg:flex-row">
                            <div class="w-full lg:w-1/2 h-[300px] lg:h-[400px] relative overflow-hidden">
                                <img src="${mainData.img || 'https://images.unsplash.com/photo-1504868584819-f8e8b4bffa41'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                <span class="absolute bottom-6 left-6 accent-tag px-3 py-1 rounded-md text-xs font-bold shadow-md">HOT ISSUE</span>
                            </div>
                            <div class="w-full lg:w-1/2 p-10 flex flex-col justify-center bg-white">
                                <div class="text-sm font-bold text-brand mb-3">[${mainData.brand}] ${mainData.source}</div>
                                <h3 class="text-3xl font-black text-gray-900 leading-tight mb-5 group-hover:text-brand transition">${mainData.title}</h3>
                                <p class="text-gray-600 text-base leading-relaxed mb-8">${mainData.desc}</p>
                                ${mainData.insight ? `
                                <div class="bg-blue-50/50 p-5 rounded-xl border border-blue-100">
                                    <div class="flex items-center gap-2 text-brand font-bold text-xs mb-2"><i class="fas fa-lightbulb text-yellow-500"></i> R&D Insight</div>
                                    <p class="text-sm text-gray-800 font-medium leading-relaxed">${mainData.insight}</p>
                                </div>` : ''}
                            </div>
                        </div>
                    </section>
                ` : '';

                // 3. 서브 기사 렌더링 함수
                const renderCards = (items) => {
                    if(!items || items.length === 0) return `<div class="col-span-full py-10 text-center text-gray-400 font-medium text-sm border-2 border-dashed border-gray-200 rounded-2xl">수집된 뉴스가 없습니다.</div>`;
                    return items.map(item => `
                        <article class="bg-white rounded-2xl p-6 article-card cursor-pointer flex flex-col h-full" onclick="smartOpen('${item.link}')">
                            <div class="flex justify-between items-start mb-4">
                                <span class="bg-gray-100 text-gray-600 px-2.5 py-1 rounded-md text-[11px] font-bold tracking-wider">[${item.brand}]</span>
                                <span class="text-gray-400 text-[10px] font-bold">${item.source}</span>
                            </div>
                            <h4 class="text-lg font-bold text-gray-900 leading-snug mb-3 group-hover:text-brand transition line-clamp-2">${item.title}</h4>
                            <p class="text-gray-500 text-sm leading-relaxed line-clamp-3 mb-6 flex-grow">${item.desc}</p>
                            ${item.insight ? `
                            <div class="mt-auto bg-gray-50 p-4 rounded-xl border-t-2 border-brand/20">
                                <p class="text-[11px] font-bold text-brand mb-1 flex items-center gap-1"><i class="fas fa-check-circle"></i> Insight</p>
                                <p class="text-xs text-gray-700 font-medium line-clamp-2">${item.insight}</p>
                            </div>` : ''}
                        </article>
                    `).join('');
                };

                // 최종 조합
                content.innerHTML = `
                    ${videoHtml}
                    ${mainHtml}
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mt-10">
                        <div>
                            <div class="flex items-center gap-2 mb-6 border-b-2 border-gray-800 pb-3">
                                <h2 class="text-xl font-black text-gray-900 tracking-tight">AI TECH 브리핑</h2>
                                <span class="bg-gray-800 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">${aiData.length}</span>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">${renderCards(aiData)}</div>
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-6 border-b-2 border-gray-800 pb-3">
                                <h2 class="text-xl font-black text-gray-900 tracking-tight">AUTO PLATFORM 동향</h2>
                                <span class="bg-gray-800 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">${autoData.length}</span>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">${renderCards(autoData)}</div>
                        </div>
                    </div>
                `;

            } catch (error) {
                content.innerHTML = `<div class="py-20 text-center text-red-500 font-bold bg-red-50 rounded-3xl"><i class="fas fa-exclamation-triangle text-3xl mb-3"></i><br>데이터를 불러오는 중 오류가 발생했습니다.</div>`;
            }
        }

        window.onload = () => {
            const now = new Date();
            const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            document.getElementById('date-picker').value = today;
            loadReport(today);
        };
    </script>
</body>
</html>
